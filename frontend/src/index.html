<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>WaKasir — WhatsApp Commerce Dashboard</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="WaKasir - Platform WhatsApp Commerce untuk bisnis Anda">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Plus Jakarta Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
</head>
<body>
  <app-root></app-root>

  <!--
    Facebook JS SDK — dibutuhkan untuk Embedded Signup (Hubungkan WhatsApp).
    SDK ini dimuat async, tidak memblokir render halaman.
    Dokumentasi: https://developers.facebook.com/docs/javascript/quickstart
    APP ID diambil dari environment.ts via Angular build.
  -->
  <script>
    window.fbAsyncInit = function() {
      FB.init({
        appId   : '123456789012345',  // Ganti dengan Meta App ID Anda dari developers.facebook.com
        cookie  : true,
        xfbml   : true,
        version : 'v18.0'
      });
    };
    (function(d, s, id) {
      var js, fjs = d.getElementsByTagName(s)[0];
      if (d.getElementById(id)) { return; }
      js = d.createElement(s); js.id = id;
      js.src = 'https://connect.facebook.net/id_ID/sdk.js';
      fjs.parentNode.insertBefore(js, fjs);
    }(document, 'script', 'facebook-jssdk'));
  </script>
</body>
</html>
